<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歡樂打地鼠</title>
  <style>
    :root {
      --cream: #fff7dc;
      --yellow: #ffd85a;
      --orange: #ff9f43;
      --brown: #7a4426;
      --dark-brown: #4b2a1a;
      --green: #7acb65;
      --green-dark: #55a94a;
      --pink: #ff7f9f;
      --ink: #4d3528;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-family: "Arial Rounded MT Bold", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at 15% 16%, rgba(255, 255, 255, 0.85) 0 5%, transparent 5.5%),
        radial-gradient(circle at 85% 25%, rgba(255, 255, 255, 0.65) 0 4%, transparent 4.5%),
        linear-gradient(#8ed8ff 0 43%, #a8e17e 43% 100%);
      user-select: none;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: -1;
      bottom: -100px;
      width: 55vw;
      height: 270px;
      border-radius: 50% 50% 0 0;
      background: #74c969;
    }

    body::before {
      left: -10vw;
      transform: rotate(5deg);
    }

    body::after {
      right: -12vw;
      background: #65ba59;
      transform: rotate(-7deg);
    }

    .game-shell {
      width: min(94vw, 680px);
      padding: 24px clamp(16px, 5vw, 38px) 34px;
      text-align: center;
      border: 6px solid rgba(255, 255, 255, 0.8);
      border-radius: 34px;
      background: rgba(255, 247, 220, 0.94);
      box-shadow: 0 18px 0 rgba(72, 112, 51, 0.28), 0 25px 50px rgba(63, 89, 54, 0.25);
    }

    h1 {
      margin: 0 0 14px;
      color: var(--orange);
      font-size: clamp(2rem, 8vw, 3.6rem);
      letter-spacing: 0.08em;
      line-height: 1;
      text-shadow: 0 4px 0 #fff, 0 7px 0 #d87932;
      transform: rotate(-1deg);
    }

    .status-bar {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin: 22px 0 24px;
    }

    .status-card {
      min-width: 130px;
      padding: 10px 18px;
      border: 3px solid var(--yellow);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 5px 0 #e3bd3e;
    }

    .status-label {
      display: block;
      margin-bottom: 2px;
      color: #9a755a;
      font-size: 0.86rem;
    }

    .status-value {
      color: var(--dark-brown);
      font-size: 1.65rem;
      font-weight: 900;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(12px, 3vw, 22px);
      padding: clamp(15px, 4vw, 28px);
      border: 5px solid var(--green-dark);
      border-radius: 30px;
      background: var(--green);
      box-shadow: inset 0 8px 0 rgba(255, 255, 255, 0.18), 0 8px 0 #3d8e3b;
    }

    .hole {
      position: relative;
      aspect-ratio: 1.25 / 1;
      overflow: hidden;
      cursor: pointer;
      border: 0;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 50% 68%, #3d2015 0 50%, #603520 51% 67%, #875033 68% 100%);
      box-shadow: inset 0 8px 10px rgba(32, 15, 8, 0.45), 0 5px 0 rgba(255, 255, 255, 0.17);
      -webkit-tap-highlight-color: transparent;
    }

    .hole::after {
      content: "";
      position: absolute;
      z-index: 3;
      right: 8%;
      bottom: -10%;
      left: 8%;
      height: 40%;
      border-radius: 50%;
      background: #7b4429;
      box-shadow: inset 0 4px 0 rgba(255, 255, 255, 0.09);
      pointer-events: none;
    }

    .mole {
      position: absolute;
      z-index: 2;
      right: 0;
      bottom: -110%;
      left: 0;
      display: grid;
      place-items: center;
      height: 100%;
      font-size: clamp(3rem, 11vw, 5.4rem);
      line-height: 1;
      filter: drop-shadow(0 5px 0 rgba(37, 17, 8, 0.25));
      pointer-events: none;
      transform: rotate(0deg);
    }

    .hole.active .mole {
      bottom: 1%;
      pointer-events: auto;
      animation: pop-up 0.25s cubic-bezier(.18, 1.5, .5, 1) both;
    }

    .hole.retreating .mole {
      animation: duck-down 0.25s ease-in both;
    }

    .hole.hit .mole {
      animation: bonk 0.22s ease-out both;
    }

    @keyframes pop-up {
      from { bottom: -110%; transform: scale(0.75) rotate(-8deg); }
      to { bottom: 1%; transform: scale(1) rotate(0deg); }
    }

    @keyframes duck-down {
      from { bottom: 1%; transform: scale(1); }
      to { bottom: -110%; transform: scale(0.8); }
    }

    @keyframes bonk {
      0% { bottom: 1%; transform: scale(1); }
      35% { bottom: 7%; transform: scale(1.15) rotate(8deg); }
      100% { bottom: -110%; transform: scale(0.65) rotate(-10deg); }
    }

    .score-pop {
      position: fixed;
      z-index: 20;
      color: #fff;
      font-size: 1.75rem;
      font-weight: 900;
      text-shadow: 0 3px 0 rgba(65, 36, 20, 0.35);
      pointer-events: none;
      animation: float-away 0.7s ease-out forwards;
    }

    .score-pop.bad {
      color: #ff526f;
    }

    @keyframes float-away {
      from { opacity: 1; transform: translate(-50%, -25%) scale(0.7); }
      to { opacity: 0; transform: translate(-50%, -110%) scale(1.25); }
    }

    .hint {
      margin: 22px 0 0;
      color: #80583d;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .modal {
      position: fixed;
      z-index: 50;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(57, 37, 23, 0.58);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s;
    }

    .modal.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-card {
      width: min(90vw, 410px);
      padding: 36px 28px 32px;
      border: 6px solid #fff;
      border-radius: 32px;
      background: var(--cream);
      box-shadow: 0 12px 0 #d17a39, 0 24px 50px rgba(43, 25, 13, 0.35);
      transform: scale(0.8) rotate(-2deg);
      transition: transform 0.3s cubic-bezier(.18, 1.4, .5, 1);
    }

    .modal.show .modal-card {
      transform: scale(1) rotate(0);
    }

    .modal-emoji {
      font-size: 4.5rem;
    }

    .modal h2 {
      margin: 8px 0;
      color: var(--orange);
      font-size: 2.3rem;
    }

    .final-text {
      margin: 12px 0 24px;
      font-size: 1.2rem;
    }

    #final-score {
      color: var(--pink);
      font-size: 2.4rem;
      font-weight: 900;
    }

    .restart-button {
      padding: 13px 28px;
      cursor: pointer;
      color: #fff;
      font: inherit;
      font-size: 1.15rem;
      font-weight: 900;
      border: 0;
      border-radius: 999px;
      background: var(--pink);
      box-shadow: 0 6px 0 #d84f73;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .restart-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #d84f73;
    }

    .restart-button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #d84f73;
    }

    @media (max-width: 500px) {
      .game-shell {
        padding: 20px 12px 25px;
        border-width: 4px;
      }

      .status-bar {
        gap: 8px;
        margin: 18px 0;
      }

      .status-card {
        min-width: 0;
        width: 43%;
        padding: 8px;
      }

      .board {
        gap: 9px;
        padding: 12px;
        border-radius: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <h1>歡樂打地鼠</h1>

    <section class="status-bar" aria-label="遊戲狀態">
      <div class="status-card">
        <span class="status-label">目前分數</span>
        <span class="status-value"><span id="score">0</span> 分</span>
      </div>
      <div class="status-card">
        <span class="status-label">剩餘時間</span>
        <span class="status-value"><span id="time">30</span> 秒</span>
      </div>
    </section>

    <section class="board" id="board" aria-label="打地鼠遊戲區">
      <button class="hole" type="button" aria-label="洞 1"><span class="mole">🐹</span></button>
      <button class="hole" type="button" aria-label="洞 2"><span class="mole">🐹</span></button>
      <button class="hole" type="button" aria-label="洞 3"><span class="mole">🐹</span></button>
      <button class="hole" type="button" aria-label="洞 4"><span class="mole">🐹</span></button>
      <button class="hole" type="button" aria-label="洞 5"><span class="mole">🐹</span></button>
      <button class="hole" type="button" aria-label="洞 6"><span class="mole">🐹</span></button>
      <button class="hole" type="button" aria-label="洞 7"><span class="mole">🐹</span></button>
      <button class="hole" type="button" aria-label="洞 8"><span class="mole">🐹</span></button>
      <button class="hole" type="button" aria-label="洞 9"><span class="mole">🐹</span></button>
    </section>

    <p class="hint">打中地鼠 +10 分，敲到空洞 -5 分！</p>
  </main>

  <div class="modal" id="result-modal" role="dialog" aria-modal="true" aria-labelledby="result-title">
    <div class="modal-card">
      <div class="modal-emoji">🏆</div>
      <h2 id="result-title">時間到！</h2>
      <p class="final-text">你的最終分數是<br><span id="final-score">0</span> 分</p>
      <button class="restart-button" id="restart-button" type="button">再玩一次</button>
    </div>
  </div>

  <script>
    const GAME_SECONDS = 30;
    const MOLE_VISIBLE_MS = 1500;

    const holes = [...document.querySelectorAll(".hole")];
    const scoreDisplay = document.getElementById("score");
    const timeDisplay = document.getElementById("time");
    const modal = document.getElementById("result-modal");
    const finalScore = document.getElementById("final-score");
    const restartButton = document.getElementById("restart-button");

    let score = 0;
    let timeLeft = GAME_SECONDS;
    let activeHole = null;
    let lastHoleIndex = -1;
    let gameRunning = false;
    let countdownTimer;
    let moleTimer;
    let nextMoleTimer;

    function showScorePop(event, text, isBad = false) {
      const pop = document.createElement("span");
      pop.className = `score-pop${isBad ? " bad" : ""}`;
      pop.textContent = text;
      pop.style.left = `${event.clientX}px`;
      pop.style.top = `${event.clientY}px`;
      document.body.appendChild(pop);
      pop.addEventListener("animationend", () => pop.remove());
    }

    function updateScore(change) {
      score += change;
      scoreDisplay.textContent = score;
    }

    function clearMole() {
      clearTimeout(moleTimer);

      if (!activeHole) {
        return;
      }

      const oldHole = activeHole;
      activeHole = null;
      oldHole.classList.remove("active");
      oldHole.classList.add("retreating");
      setTimeout(() => oldHole.classList.remove("retreating", "hit"), 260);
    }

    function scheduleNextMole(delay = 300 + Math.random() * 450) {
      clearTimeout(nextMoleTimer);

      if (!gameRunning) {
        return;
      }

      nextMoleTimer = setTimeout(showMole, delay);
    }

    function showMole() {
      if (!gameRunning) {
        return;
      }

      clearMole();

      let nextIndex;
      do {
        nextIndex = Math.floor(Math.random() * holes.length);
      } while (nextIndex === lastHoleIndex);

      lastHoleIndex = nextIndex;
      activeHole = holes[nextIndex];
      activeHole.classList.remove("retreating", "hit");
      activeHole.classList.add("active");

      moleTimer = setTimeout(() => {
        clearMole();
        scheduleNextMole();
      }, MOLE_VISIBLE_MS);
    }

    function handleHoleClick(event) {
      if (!gameRunning) {
        return;
      }

      const hole = event.currentTarget;

      if (hole === activeHole && hole.classList.contains("active")) {
        updateScore(10);
        showScorePop(event, "+10");
        hole.classList.add("hit");
        clearMole();
        scheduleNextMole(180);
      } else {
        updateScore(-5);
        showScorePop(event, "-5", true);
      }
    }

    function endGame() {
      gameRunning = false;
      clearInterval(countdownTimer);
      clearTimeout(nextMoleTimer);
      clearMole();
      timeLeft = 0;
      timeDisplay.textContent = timeLeft;
      finalScore.textContent = score;
      modal.classList.add("show");
      restartButton.focus();
    }

    function startGame() {
      clearInterval(countdownTimer);
      clearTimeout(moleTimer);
      clearTimeout(nextMoleTimer);

      score = 0;
      timeLeft = GAME_SECONDS;
      lastHoleIndex = -1;
      gameRunning = true;
      scoreDisplay.textContent = score;
      timeDisplay.textContent = timeLeft;
      modal.classList.remove("show");
      holes.forEach((hole) => hole.classList.remove("active", "retreating", "hit"));

      showMole();
      countdownTimer = setInterval(() => {
        timeLeft -= 1;
        timeDisplay.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    holes.forEach((hole) => hole.addEventListener("click", handleHoleClick));
    restartButton.addEventListener("click", startGame);

    startGame();
  </script>
</body>
</html>
