<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Dream Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --pink: #ff70d9;
      --blue: #63d9ff;
      --green: #65ff9d;
      --purple: #9b7bff;
      --ink: #09051b;
      --text: #fff8ff;
      --muted: #c5bde0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--text);
      font-family: "Orbitron", system-ui, sans-serif;
      background:
        radial-gradient(circle at 16% 12%, rgba(255, 112, 217, 0.24), transparent 24rem),
        radial-gradient(circle at 84% 78%, rgba(99, 217, 255, 0.2), transparent 28rem),
        radial-gradient(circle at 50% 45%, #20133f, #09051b 65%);
      user-select: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      opacity: 0.42;
      pointer-events: none;
      background-image:
        radial-gradient(circle, #fff 0 1px, transparent 1.5px),
        radial-gradient(circle, var(--pink) 0 1px, transparent 1.5px);
      background-position: 0 0, 33px 47px;
      background-size: 78px 78px, 103px 103px;
      animation: sky-drift 18s linear infinite;
    }

    @keyframes sky-drift {
      to { transform: translateY(78px); }
    }

    .game {
      position: relative;
      width: min(92vw, 660px);
      padding: 22px;
      border: 2px solid rgba(99, 217, 255, 0.52);
      border-radius: 32px;
      background: linear-gradient(145deg, rgba(34, 17, 69, 0.94), rgba(10, 9, 35, 0.96));
      box-shadow:
        0 0 24px rgba(99, 217, 255, 0.2),
        0 0 65px rgba(255, 112, 217, 0.16),
        0 30px 90px rgba(0, 0, 0, 0.58);
    }

    .game::before {
      content: "";
      position: absolute;
      inset: 7px;
      border: 1px solid rgba(255, 112, 217, 0.24);
      border-radius: 24px;
      pointer-events: none;
    }

    .game.shake {
      animation: shake 0.3s linear;
    }

    @keyframes shake {
      0%, 100% { transform: translate(0); }
      15% { transform: translate(-8px, 4px) rotate(-0.4deg); }
      30% { transform: translate(7px, -5px) rotate(0.4deg); }
      45% { transform: translate(-6px, -2px); }
      60% { transform: translate(5px, 4px); }
      80% { transform: translate(-2px, -2px); }
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 5px 18px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.15rem, 4vw, 1.7rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      background: linear-gradient(90deg, var(--pink), #fff, var(--blue), var(--green));
      background-size: 200% auto;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 9px rgba(255, 112, 217, 0.65));
      animation: title-shine 4s linear infinite;
    }

    @keyframes title-shine {
      to { background-position: 200% center; }
    }

    .score {
      min-width: 126px;
      padding: 9px 15px;
      text-align: right;
      border: 1px solid rgba(101, 255, 157, 0.5);
      border-radius: 16px;
      background: rgba(8, 12, 35, 0.72);
      box-shadow: inset 0 0 15px rgba(101, 255, 157, 0.08), 0 0 15px rgba(101, 255, 157, 0.15);
    }

    .score-label {
      margin-right: 7px;
      color: var(--muted);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
    }

    .mission {
      margin: -8px 5px 14px;
      color: #ffe8a8;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-align: center;
      text-shadow: 0 0 10px rgba(255, 213, 113, 0.45);
    }

    #score-value {
      display: inline-block;
      color: var(--green);
      font-size: 1.35rem;
      font-weight: 900;
      text-shadow: 0 0 12px var(--green);
    }

    #score-value.pop {
      animation: score-pop 0.2s ease-out;
    }

    @keyframes score-pop {
      50% { transform: scale(1.8); color: #fff; text-shadow: 0 0 22px #fff, 0 0 35px var(--pink); }
    }

    .board-wrap {
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255, 112, 217, 0.55);
      border-radius: 23px;
      background: #070619;
      box-shadow:
        inset 0 0 45px rgba(99, 217, 255, 0.1),
        0 0 20px rgba(255, 112, 217, 0.2);
    }

    .board-wrap.dying canvas {
      animation: slow-fade 0.65s cubic-bezier(.2, .75, .4, 1) forwards;
    }

    @keyframes slow-fade {
      0% { filter: saturate(1) brightness(1); opacity: 1; transform: scale(1); }
      45% { filter: saturate(1.8) brightness(1.35); }
      100% { filter: saturate(0.15) brightness(0.35); opacity: 0.28; transform: scale(1.025); }
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      touch-action: none;
    }

    .help {
      position: relative;
      z-index: 2;
      margin: 15px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
    }

    kbd {
      display: inline-grid;
      min-width: 26px;
      height: 26px;
      margin: 0 2px;
      place-items: center;
      color: #fff;
      font: inherit;
      border: 1px solid rgba(99, 217, 255, 0.58);
      border-radius: 8px;
      background: linear-gradient(145deg, #2c2453, #15142e);
      box-shadow: 0 0 8px rgba(99, 217, 255, 0.22), 0 3px 0 #060511;
    }

    .overlay {
      position: absolute;
      z-index: 5;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      visibility: hidden;
      opacity: 0;
      background: rgba(8, 4, 25, 0.58);
      backdrop-filter: blur(8px);
      transition: opacity 0.45s ease, visibility 0.45s;
    }

    .overlay.show {
      visibility: visible;
      opacity: 1;
    }

    .dialog {
      width: min(90%, 340px);
      padding: 31px;
      text-align: center;
      border: 1px solid rgba(255, 112, 217, 0.72);
      border-radius: 26px;
      background: linear-gradient(145deg, rgba(46, 25, 84, 0.97), rgba(12, 13, 43, 0.98));
      box-shadow: 0 0 22px rgba(255, 112, 217, 0.3), 0 22px 50px rgba(0, 0, 0, 0.55);
      transform: translateY(14px) scale(0.92);
      transition: transform 0.5s cubic-bezier(.18, 1.35, .5, 1);
    }

    .overlay.show .dialog {
      transform: translateY(0) scale(1);
    }

    .dialog h2 {
      margin: 0 0 10px;
      color: #fff;
      font-size: clamp(1.7rem, 7vw, 2.35rem);
      text-shadow: 0 0 12px var(--pink), 0 0 28px var(--blue);
    }

    .dialog p {
      margin: 0 0 23px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    #final-score {
      color: var(--green);
      font-size: 1.15rem;
      font-weight: 900;
      text-shadow: 0 0 10px var(--green);
    }

    .restart {
      width: 100%;
      padding: 13px 20px;
      cursor: pointer;
      color: #120827;
      font: inherit;
      font-size: 0.78rem;
      font-weight: 900;
      border: 0;
      border-radius: 15px;
      background: linear-gradient(90deg, var(--pink), var(--blue), var(--green));
      background-size: 180% auto;
      box-shadow: 0 0 22px rgba(99, 217, 255, 0.4);
      transition: transform 120ms ease, filter 120ms ease;
    }

    .restart:hover {
      filter: brightness(1.15);
      transform: translateY(-2px);
    }

    .restart:active {
      transform: translateY(1px);
    }

    .ending {
      position: fixed;
      z-index: 20;
      inset: 0;
      display: grid;
      place-items: center;
      visibility: hidden;
      opacity: 0;
      cursor: pointer;
      background: #080419;
      transition: opacity 0.65s ease, visibility 0.65s;
    }

    .ending.show {
      visibility: visible;
      opacity: 1;
    }

    .ending-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 1;
      transition: opacity 0.35s ease;
    }

    .ending.changing .ending-image,
    .ending.changing .ending-copy {
      opacity: 0;
    }

    .ending-copy {
      position: absolute;
      left: 50%;
      bottom: clamp(28px, 6vh, 72px);
      width: min(88vw, 900px);
      padding: 18px 24px;
      color: #fff8df;
      text-align: center;
      border: 1px solid rgba(255, 225, 156, 0.7);
      border-radius: 18px;
      background: rgba(18, 11, 35, 0.76);
      box-shadow: 0 0 30px rgba(255, 203, 99, 0.25);
      backdrop-filter: blur(7px);
      transform: translateX(-50%);
      transition: opacity 0.35s ease;
    }

    .ending-copy h2 {
      margin: 0 0 8px;
      color: #ffe49d;
      font-size: clamp(1.2rem, 3vw, 2rem);
    }

    .ending-copy p {
      margin: 0;
      font-family: system-ui, sans-serif;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      line-height: 1.7;
    }

    .ending-hint {
      display: block;
      margin-top: 10px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.65rem;
    }

    .ending-complete {
      display: none;
      position: absolute;
      inset: 0;
      place-items: center;
      padding: 24px;
      text-align: center;
      background: rgba(8, 4, 25, 0.76);
      backdrop-filter: blur(9px);
    }

    .ending.finished .ending-complete {
      display: grid;
    }

    .ending.finished .ending-image,
    .ending.finished .ending-copy {
      opacity: 0.35;
    }

    .complete-card h2 {
      margin: 0 0 12px;
      color: #ffe49d;
      font-size: clamp(2rem, 7vw, 4.5rem);
      text-shadow: 0 0 24px #ffb84d;
    }

    .complete-card p {
      margin: 0 0 24px;
      color: #fff8df;
    }

    @media (max-height: 760px) {
      .game { width: min(80vh, 92vw); padding: 15px; }
      .topbar { margin-bottom: 11px; }
      .help { margin-top: 9px; }
    }

    @media (prefers-reduced-motion: reduce) {
      body::before, .title { animation: none; }
    }
  </style>
</head>
<body>
  <main class="game" id="game">
    <header class="topbar">
      <h1 class="title">NEON DREAM SNAKE</h1>
      <div class="score" aria-live="polite">
        <span class="score-label">SCORE</span>
        <span id="score-value">0</span>
      </div>
    </header>

    <p class="mission">冒險任務：收集 4 枚星印　<span id="mission-progress">0 / 40</span></p>

    <div class="board-wrap" id="board-wrap">
      <canvas id="board" width="600" height="600" aria-label="貪吃蛇遊戲區"></canvas>
      <div class="overlay" id="game-over" role="dialog" aria-modal="true" aria-labelledby="game-over-title">
        <div class="dialog">
          <h2 id="game-over-title">Game Over</h2>
          <p>本次得分：<span id="final-score">0</span></p>
          <button class="restart" id="restart" type="button">重新開始</button>
        </div>
      </div>
    </div>

    <p class="help">使用 <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 控制方向</p>
  </main>

  <section class="ending" id="ending" aria-live="polite">
    <img class="ending-image" id="ending-image" src="1拷貝.png" alt="">
    <div class="ending-copy" id="ending-copy">
      <h2 id="ending-title"></h2>
      <p id="ending-text"></p>
      <span class="ending-hint">點一下繼續</span>
    </div>
    <div class="ending-complete">
      <div class="complete-card">
        <h2>群星仍在前方</h2>
        <p>冒險完成</p>
        <button class="restart" id="adventure-again" type="button">再次冒險</button>
      </div>
    </div>
  </section>

  <script>
    const canvas = document.getElementById("board");
    const context = canvas.getContext("2d");
    const gameElement = document.getElementById("game");
    const boardWrap = document.getElementById("board-wrap");
    const scoreElement = document.getElementById("score-value");
    const finalScoreElement = document.getElementById("final-score");
    const overlay = document.getElementById("game-over");
    const restartButton = document.getElementById("restart");
    const missionProgress = document.getElementById("mission-progress");
    const ending = document.getElementById("ending");
    const endingImage = document.getElementById("ending-image");
    const endingTitle = document.getElementById("ending-title");
    const endingText = document.getElementById("ending-text");
    const adventureAgainButton = document.getElementById("adventure-again");

    const GRID_SIZE = 20;
    const CELL_SIZE = canvas.width / GRID_SIZE;
    const MOVE_DELAY = 115;
    const MISSION_SCORE = 40;
    const COLORS = ["#ff70d9", "#ae78ff", "#63d9ff", "#65ff9d"];
    const DIRECTIONS = {
      ArrowUp: { x: 0, y: -1 },
      ArrowDown: { x: 0, y: 1 },
      ArrowLeft: { x: -1, y: 0 },
      ArrowRight: { x: 1, y: 0 }
    };

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let running;
    let timer;
    let audioContext;
    let particles = [];
    let trails = [];
    let glowUntil = 0;
    let lastFrame = performance.now();
    let endingIndex = 0;
    let endingLocked = false;
    const endingScenes = [
      {
        image: "1拷貝.png",
        title: "星門甦醒",
        text: "當最後一枚星印歸位，風停止了流浪。沉睡已久的門，終於記起自己的名字。"
      },
      {
        image: "2拷貝.png",
        title: "門後的世界",
        text: "原來門沒有通往終點。它只是把遠方，重新交還到他們手中。"
      },
      {
        image: "3拷貝.png",
        title: "星光送別",
        text: "有些告別不需要名字。回頭時仍亮著的燈，已經說完了一切。"
      },
      {
        image: "4拷貝.png",
        title: "新的地平線",
        text: "天亮以後，地圖多了一條沒有名字的路。「那就先別替它命名。」"
      }
    ];

    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function tone(frequency, duration, type = "sine", volume = 0.055, delay = 0) {
      if (!audioContext) return;
      const start = audioContext.currentTime + delay;
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      oscillator.connect(gain).connect(audioContext.destination);
      oscillator.start(start);
      oscillator.stop(start + duration + 0.03);
    }

    function playKeySound() {
      tone(280, 0.045, "sine", 0.025);
      tone(430, 0.035, "triangle", 0.018, 0.018);
    }

    function playEatSound() {
      tone(520, 0.11, "sine", 0.06);
      tone(760, 0.14, "triangle", 0.05, 0.06);
      tone(1040, 0.18, "sine", 0.04, 0.12);
    }

    function playGameOverSound() {
      tone(310, 0.22, "sawtooth", 0.035);
      tone(225, 0.3, "triangle", 0.045, 0.15);
      tone(130, 0.48, "sine", 0.055, 0.35);
    }

    function playVictorySound() {
      [523, 659, 784, 1047].forEach((frequency, index) => {
        tone(frequency, 0.35, "sine", 0.05, index * 0.12);
      });
    }

    function showEndingScene(index) {
      const scene = endingScenes[index];
      endingImage.src = scene.image;
      endingImage.alt = scene.title;
      endingTitle.textContent = scene.title;
      endingText.textContent = scene.text;
    }

    function completeMission() {
      running = false;
      clearTimeout(timer);
      playVictorySound();
      endingIndex = 0;
      endingLocked = false;
      ending.classList.remove("finished", "changing");
      showEndingScene(endingIndex);
      ending.classList.add("show");
    }

    function advanceEnding(event) {
      if (!ending.classList.contains("show") || ending.classList.contains("finished")) return;
      if (event.target.closest("button") || endingLocked) return;
      if (endingIndex === endingScenes.length - 1) {
        ending.classList.add("finished");
        adventureAgainButton.focus();
        return;
      }
      endingLocked = true;
      ending.classList.add("changing");
      setTimeout(() => {
        endingIndex += 1;
        showEndingScene(endingIndex);
        ending.classList.remove("changing");
        endingLocked = false;
      }, 350);
    }

    function randomFood() {
      let position;
      do {
        position = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
      } while (snake.some((segment) => segment.x === position.x && segment.y === position.y));
      return position;
    }

    function roundedRect(x, y, width, height, radius) {
      context.beginPath();
      context.roundRect(x, y, width, height, radius);
      context.fill();
    }

    function createStars(x, y) {
      for (let i = 0; i < 10; i += 1) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 55 + Math.random() * 105;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          size: 3 + Math.random() * 4,
          color: COLORS[Math.floor(Math.random() * COLORS.length)]
        });
      }
    }

    function drawStar(x, y, radius, color, alpha) {
      context.save();
      context.translate(x, y);
      context.fillStyle = color;
      context.globalAlpha = alpha;
      context.shadowColor = color;
      context.shadowBlur = 12;
      context.beginPath();
      for (let i = 0; i < 10; i += 1) {
        const angle = -Math.PI / 2 + i * Math.PI / 5;
        const length = i % 2 === 0 ? radius : radius * 0.42;
        context.lineTo(Math.cos(angle) * length, Math.sin(angle) * length);
      }
      context.closePath();
      context.fill();
      context.restore();
    }

    function updateEffects(delta) {
      particles.forEach((particle) => {
        particle.x += particle.vx * delta;
        particle.y += particle.vy * delta;
        particle.vy += 85 * delta;
        particle.life -= delta * 1.45;
        particle.size += delta * 1.5;
      });
      particles = particles.filter((particle) => particle.life > 0);
      trails.forEach((trail) => { trail.life -= delta * 2.5; });
      trails = trails.filter((trail) => trail.life > 0);
    }

    function drawBackground() {
      const gradient = context.createRadialGradient(300, 260, 30, 300, 300, 410);
      gradient.addColorStop(0, "#171338");
      gradient.addColorStop(1, "#060515");
      context.fillStyle = gradient;
      context.fillRect(0, 0, canvas.width, canvas.height);

      context.strokeStyle = "rgba(99, 217, 255, 0.055)";
      context.lineWidth = 1;
      for (let i = 1; i < GRID_SIZE; i += 1) {
        const point = i * CELL_SIZE;
        context.beginPath();
        context.moveTo(point, 0);
        context.lineTo(point, canvas.height);
        context.stroke();
        context.beginPath();
        context.moveTo(0, point);
        context.lineTo(canvas.width, point);
        context.stroke();
      }
    }

    function drawTrail() {
      trails.forEach((trail) => {
        const color = COLORS[trail.colorIndex % COLORS.length];
        const size = CELL_SIZE * (0.38 + trail.life * 0.3);
        context.save();
        context.globalAlpha = trail.life * 0.36;
        context.fillStyle = color;
        context.shadowColor = color;
        context.shadowBlur = 25;
        context.beginPath();
        context.arc(trail.x, trail.y, size, 0, Math.PI * 2);
        context.fill();
        context.restore();
      });
    }

    function drawFood(now) {
      const pulse = 1 + Math.sin(now / 170) * 0.14;
      const x = food.x * CELL_SIZE + CELL_SIZE / 2;
      const y = food.y * CELL_SIZE + CELL_SIZE / 2;
      context.save();
      context.fillStyle = "#ff4b87";
      context.shadowColor = "#ff4b87";
      context.shadowBlur = 18 + Math.sin(now / 170) * 10;
      context.beginPath();
      context.arc(x, y, CELL_SIZE * 0.3 * pulse, 0, Math.PI * 2);
      context.fill();
      context.fillStyle = "rgba(255,255,255,.9)";
      context.beginPath();
      context.arc(x - 5, y - 6, 3.5, 0, Math.PI * 2);
      context.fill();
      context.restore();
    }

    function drawSnake(now) {
      const superGlow = now < glowUntil;
      snake.forEach((segment, index) => {
        const ratio = snake.length <= 1 ? 0 : index / (snake.length - 1);
        const gradient = context.createLinearGradient(
          segment.x * CELL_SIZE,
          segment.y * CELL_SIZE,
          (segment.x + 1) * CELL_SIZE,
          (segment.y + 1) * CELL_SIZE
        );
        const colorA = COLORS[Math.floor(ratio * 3) % COLORS.length];
        const colorB = COLORS[(Math.floor(ratio * 3) + 1) % COLORS.length];
        gradient.addColorStop(0, colorA);
        gradient.addColorStop(1, colorB);
        const gap = index === 0 ? 2 : 3;
        context.fillStyle = gradient;
        context.shadowColor = superGlow ? "#ffffff" : colorA;
        context.shadowBlur = superGlow ? 34 : index === 0 ? 19 : 11;
        roundedRect(
          segment.x * CELL_SIZE + gap,
          segment.y * CELL_SIZE + gap,
          CELL_SIZE - gap * 2,
          CELL_SIZE - gap * 2,
          9
        );

        if (index === 0) {
          context.fillStyle = "#17102d";
          context.shadowBlur = 0;
          const horizontal = direction.x !== 0;
          const eyeOffsetX = horizontal ? direction.x * 7 : 6;
          const eyeOffsetY = horizontal ? 6 : direction.y * 7;
          const centerX = segment.x * CELL_SIZE + CELL_SIZE / 2;
          const centerY = segment.y * CELL_SIZE + CELL_SIZE / 2;
          [-1, 1].forEach((side) => {
            context.beginPath();
            context.arc(
              centerX + (horizontal ? eyeOffsetX : side * 6),
              centerY + (horizontal ? side * 6 : eyeOffsetY),
              2.5, 0, Math.PI * 2
            );
            context.fill();
          });
        }
      });
      context.shadowBlur = 0;
    }

    function render(now) {
      const delta = Math.min((now - lastFrame) / 1000, 0.04);
      lastFrame = now;
      updateEffects(delta);
      drawBackground();
      drawTrail();
      drawFood(now);
      drawSnake(now);
      particles.forEach((particle) => {
        drawStar(particle.x, particle.y, particle.size, particle.color, particle.life);
      });
      requestAnimationFrame(render);
    }

    function isCollision(head) {
      const hitWall = head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE;
      const hitSelf = snake.some((segment) => segment.x === head.x && segment.y === head.y);
      return hitWall || hitSelf;
    }

    function gameOver() {
      running = false;
      clearTimeout(timer);
      playGameOverSound();
      finalScoreElement.textContent = score;
      gameElement.classList.remove("shake");
      void gameElement.offsetWidth;
      gameElement.classList.add("shake");
      boardWrap.classList.add("dying");
      setTimeout(() => {
        overlay.classList.add("show");
        restartButton.focus();
      }, 360);
    }

    function celebrateFood(head) {
      scoreElement.classList.remove("pop");
      void scoreElement.offsetWidth;
      scoreElement.classList.add("pop");
      glowUntil = performance.now() + 420;
      createStars(
        head.x * CELL_SIZE + CELL_SIZE / 2,
        head.y * CELL_SIZE + CELL_SIZE / 2
      );
      playEatSound();
    }

    function move() {
      if (!running) return;

      direction = nextDirection;
      const oldHead = snake[0];
      const head = {
        x: oldHead.x + direction.x,
        y: oldHead.y + direction.y
      };

      if (isCollision(head)) {
        gameOver();
        return;
      }

      trails.push({
        x: oldHead.x * CELL_SIZE + CELL_SIZE / 2,
        y: oldHead.y * CELL_SIZE + CELL_SIZE / 2,
        life: 1,
        colorIndex: Math.floor(Math.random() * COLORS.length)
      });
      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreElement.textContent = score;
        missionProgress.textContent = `${Math.min(score, MISSION_SCORE)} / ${MISSION_SCORE}`;
        celebrateFood(head);
        if (score >= MISSION_SCORE) {
          completeMission();
          return;
        }
        food = randomFood();
      } else {
        snake.pop();
      }

      timer = setTimeout(move, MOVE_DELAY);
    }

    function changeDirection(event) {
      const chosen = DIRECTIONS[event.key];
      if (!chosen) return;
      event.preventDefault();
      initAudio();

      if (chosen.x + direction.x === 0 && chosen.y + direction.y === 0) return;
      nextDirection = chosen;
      playKeySound();
    }

    function startGame() {
      initAudio();
      clearTimeout(timer);
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      running = true;
      particles = [];
      trails = [];
      glowUntil = 0;
      food = randomFood();
      scoreElement.textContent = score;
      missionProgress.textContent = `0 / ${MISSION_SCORE}`;
      overlay.classList.remove("show");
      ending.classList.remove("show", "finished", "changing");
      boardWrap.classList.remove("dying");
      gameElement.classList.remove("shake");
      timer = setTimeout(move, MOVE_DELAY);
    }

    document.addEventListener("keydown", changeDirection);
    restartButton.addEventListener("click", startGame);
    ending.addEventListener("click", advanceEnding);
    adventureAgainButton.addEventListener("click", (event) => {
      event.stopPropagation();
      startGame();
    });
    startGame();
    requestAnimationFrame(render);
  </script>
</body>
</html>
